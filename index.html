<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Old Achimotan Association - App Download</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #f5f5f5; /* Material light background */
      color: #222;
    }
    .material-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px 0 rgba(0,0,0,0.08), 0 1.5px 4px 0 rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      margin-top: 2rem;
      margin-bottom: 2rem;
    }
    .btn-custom {
      border-radius: 0.75rem;
      font-weight: 600;
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
      transition: background 0.2s, color 0.2s;
    }
    .btn-black {
      background: #222 !important;
      color: #fff !important;
      border: none;
    }
    .btn-black:hover {
      background: #000 !important;
      color: #fff !important;
    }
    .btn-outline-black {
      background: #fff !important;
      color: #222 !important;
      border: 2px solid #222 !important;
    }
    .btn-outline-black:hover {
      background: #222 !important;
      color: #fff !important;
    }
    .btn-white {
      background: #fff !important;
      color: #222 !important;
      border: 2px solid #222 !important;
    }
    .btn-white:hover {
      background: #222 !important;
      color: #fff !important;
    }
    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.10);
      border: 2px solid #222;
    }
    .material-divider {
      border-top: 2px solid #222;
      opacity: 0.08;
      margin: 0;
    }
    .material-footer {
      background: #fff;
      color: #222;
      border-top: 2px solid #222;
      opacity: 0.98;
    }
    .material-nav a {
      color: #222 !important;
      font-weight: 500;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    .material-nav a:hover {
      color: #000 !important;
      text-decoration: underline;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between">
  <!-- Header -->
  <header class="py-4 bg-black shadow-sm">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <img src="assets/logo.png" alt="OAA Logo" class="logo me-3">
        <span class="fs-3 fw-bold tracking-widest text-white">Achimota Centenary Raffle App</span>
      </div>
      <!-- Navigation removed as requested -->
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="container d-flex justify-content-center">
      <div class="material-card w-100" style="max-width: 900px;">
        <h1 class="display-5 fw-bold mb-3 tracking-widest" style="color:#222;">Download the Achimota Centenary Raffle App</h1>
        <p class="lead mb-5 text-secondary">Support a worthy cause.</p>
        <div id="download" class="d-flex flex-column flex-md-row justify-content-center gap-3 mb-5">
          <div class="d-flex flex-column align-items-center">
            <a href="#" class="btn btn-white btn-lg btn-custom shadow-sm mb-1">
              <i class="bi bi-android2 me-2"></i> Download for Android
            </a>
            <span class="text-muted small">Coming soon</span>
          </div>
          <div class="d-flex flex-column align-items-center">
            <a href="#" class="btn btn-black btn-lg btn-custom shadow-sm mb-1">
              <i class="bi bi-apple me-2"></i> Download for iOS
            </a>
            <span class="text-muted small">Coming soon</span>
          </div>
          <div class="d-flex flex-column align-items-center">
            <a href="#" class="btn btn-outline-black btn-lg btn-custom shadow-sm align-self-center mb-1">
              <i class="bi bi-file-earmark-arrow-down me-2"></i> Download APK
            </a>
            <span class="text-muted small">Download</span>
          </div>
        </div>

        <!-- <div id="about" class="mt-4">
          <h2 class="h5 fw-semibold mb-3" style="color:#222;">About the OAA App</h2>
          <p class="text-secondary mb-0">
            The Old Achimotan Association app is your gateway to the Achimotan alumni community. Access exclusive content, event updates, and connect with fellow Akoras worldwide.
          </p>
        </div> -->


      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-4 material-footer text-center">
    <div class="container">
      <span class="text-secondary">&copy; 2025 Old Achimotan Association. All rights reserved.</span>
    </div>
  </footer>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Bootstrap Icons (for download icons) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</body>
</html>
